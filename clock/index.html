<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #fff;
        color: #000;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }

      #time {
        font-size: 96px;
        font-weight: bold;
        line-height: 1;
        letter-spacing: -2px;
        margin-top: 120px;
      }

      #date {
        font-size: 32px;
        margin-top: 40px;
      }

      #weekday {
        font-size: 24px;
        color: #555;
        margin-top: 12px;
      }

      #yangzhou {
        font-size: 24px;
        color: #555;
        margin-top: 48px;
      }

      #lunar {
        font-size: 24px;
        color: #555;
        margin-top: 12px;
      }

      #back {
        position: fixed;
        bottom: 16px;
        left: 16px;
        font-size: 16px;
        color: #aaa;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div id="time">--:--</div>
    <div id="date"></div>
    <div id="weekday"></div>
    <div id="yangzhou"></div>
    <div id="lunar"></div>
    <a id="back" href="../index.html">返回</a>

    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <script>
      var months = [
        "January",
        "February",
        "March",
        "April",
        "May",
        "June",
        "July",
        "August",
        "September",
        "October",
        "November",
        "December",
      ];
      var weekdays = [
        "Sunday",
        "Monday",
        "Tuesday",
        "Wednesday",
        "Thursday",
        "Friday",
        "Saturday",
      ];

      function pad(n) {
        return n < 10 ? "0" + n : "" + n;
      }

      // 计算达拉斯中部时区偏移（自动处理夏令时）
      // DST：3月第二个周日 2:00 AM CST (=8:00 UTC) 开始；11月第一个周日 2:00 AM CDT (=7:00 UTC) 结束
      function getCentralOffset(utcMs) {
        var d = new Date(utcMs);
        var y = d.getUTCFullYear();
        var m = d.getUTCMonth(); // 0-based
        if (m < 2 || m > 10) return -6; // Jan/Feb/Dec: CST
        if (m > 2 && m < 10) return -5; // Apr–Oct: CDT
        if (m === 2) {
          // March
          var dow = new Date(Date.UTC(y, 2, 1)).getUTCDay();
          var sun2 = (dow === 0 ? 1 : 8 - dow) + 7;
          return utcMs >= Date.UTC(y, 2, sun2, 8) ? -5 : -6;
        }
        // November
        var dow = new Date(Date.UTC(y, 10, 1)).getUTCDay();
        var sun1 = dow === 0 ? 1 : 8 - dow;
        return utcMs >= Date.UTC(y, 10, sun1, 7) ? -6 : -5;
      }

      function update() {
        var utcMs = new Date().getTime();

        // 达拉斯本地时间
        var ctOffset = getCentralOffset(utcMs);
        var ctNow = new Date(utcMs + ctOffset * 60 * 60 * 1000);
        var h = ctNow.getUTCHours();
        var m = pad(ctNow.getUTCMinutes());
        var ampm = h >= 12 ? "PM" : "AM";
        h = h % 12 || 12;
        document.getElementById("time").textContent = h + ":" + m + " " + ampm;

        var y = ctNow.getUTCFullYear();
        var mo = ctNow.getUTCMonth();
        var d = ctNow.getUTCDate();
        document.getElementById("date").textContent =
          months[mo] + " " + d + ", " + y;
        document.getElementById("weekday").textContent =
          weekdays[ctNow.getUTCDay()];

        try {
          var lunar = Lunar.fromDate(new Date(y, mo, d));
          document.getElementById("lunar").textContent =
            "农历 " +
            lunar.getMonthInChinese() +
            "月" +
            lunar.getDayInChinese();
        } catch (e) {
          document.getElementById("lunar").textContent = "";
        }

        // 扬州时间 UTC+8
        var yzNow = new Date(utcMs + 8 * 60 * 60 * 1000);
        var yzH = yzNow.getUTCHours();
        var yzM = pad(yzNow.getUTCMinutes());
        var yzAmpm = yzH >= 12 ? "PM" : "AM";
        yzH = yzH % 12 || 12;
        var yzMo = yzNow.getUTCMonth() + 1;
        var yzD = yzNow.getUTCDate();
        var yzAmpmCn = yzAmpm === "AM" ? "上午" : "下午";
        document.getElementById("yangzhou").textContent =
          "扬州  " + yzMo + "月" + yzD + "日  " + yzAmpmCn + yzH + ":" + yzM;
      }

      update();

      // 对齐到下一个整分钟再开始 60s 循环，保持准确
      var now = new Date();
      var msToNextMinute =
        (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
      setTimeout(function () {
        update();
        setInterval(update, 60000);
      }, msToNextMinute);
    </script>
  </body>
</html>
