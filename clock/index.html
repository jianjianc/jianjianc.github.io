<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>时钟</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #fff;
        color: #000;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }

      #time {
        font-size: 22vw;
        font-weight: bold;
        line-height: 1;
        letter-spacing: -0.02em;
      }

      #date {
        font-size: 5.5vw;
        margin-top: 5vw;
      }

      #weekday {
        font-size: 4vw;
        color: #555;
        margin-top: 1.5vw;
      }

      #lunar {
        font-size: 4vw;
        color: #555;
        margin-top: 1.5vw;
      }

      #yangzhou {
        font-size: 4vw;
        color: #555;
        margin-top: 4vw;
      }

      #back {
        position: fixed;
        bottom: 2vw;
        left: 2vw;
        font-size: 3vw;
        color: #aaa;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div id="time">--:--</div>
    <div id="date"></div>
    <div id="weekday"></div>
    <div id="yangzhou"></div>
    <div id="lunar"></div>
    <a id="back" href="../index.html">返回</a>

    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <script>
      var months = [
        "January",
        "February",
        "March",
        "April",
        "May",
        "June",
        "July",
        "August",
        "September",
        "October",
        "November",
        "December",
      ];
      var weekdays = [
        "Sunday",
        "Monday",
        "Tuesday",
        "Wednesday",
        "Thursday",
        "Friday",
        "Saturday",
      ];

      function update() {
        var now = new Date();

        var h = now.getHours();
        var m = String(now.getMinutes()).padStart(2, "0");
        var ampm = h >= 12 ? "PM" : "AM";
        h = h % 12 || 12;
        document.getElementById("time").textContent = h + ":" + m + " " + ampm;

        var y = now.getFullYear();
        var mo = now.getMonth();
        var d = now.getDate();
        document.getElementById("date").textContent =
          months[mo] + " " + d + ", " + y;
        document.getElementById("weekday").textContent = weekdays[now.getDay()];

        var lunar = Lunar.fromDate(now);
        document.getElementById("lunar").textContent =
          "农历 " + lunar.getMonthInChinese() + "月" + lunar.getDayInChinese();

        // 扬州时间 UTC+8：now.getTime() 是 UTC 毫秒，直接加 8 小时再用 getUTC* 读取
        var yzNow = new Date(now.getTime() + 8 * 60 * 60 * 1000);
        var yzH = yzNow.getUTCHours();
        var yzM = String(yzNow.getUTCMinutes()).padStart(2, "0");
        var yzAmpm = yzH >= 12 ? "PM" : "AM";
        yzH = yzH % 12 || 12;
        var yzMo = yzNow.getUTCMonth() + 1;
        var yzD = yzNow.getUTCDate();
        var yzAmpmCn = yzAmpm === "AM" ? "上午" : "下午";
        document.getElementById("yangzhou").textContent =
          "扬州  " + yzMo + "月" + yzD + "日  " + yzAmpmCn + yzH + ":" + yzM;
      }

      update();

      // 对齐到下一个整分钟再开始 60s 循环，保持准确
      var now = new Date();
      var msToNextMinute =
        (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
      setTimeout(function () {
        update();
        setInterval(update, 60000);
      }, msToNextMinute);
    </script>
  </body>
</html>
